# Dota 2 AI Coach — copy to config.local.yaml and override secrets (gitignored recommended)

gsi:
  host: "127.0.0.1"
  port: 3000

capture:
  fps: 2.0
  monitor: 0  # primary

display:
  baseline_width: 1920
  baseline_height: 1080

paths:
  db: "dota_gsi.db"
  templates_heroes: "assets/templates/heroes"
  templates_portraits: "assets/templates/portraits"
  templates_items: "assets/templates/items"
  templates_wards: "assets/templates/wards"

llm:
  provider: "openai"  # openai | anthropic | ollama
  openai_model: "gpt-4o-mini"
  anthropic_model: "claude-3-5-haiku-20241022"
  ollama_model: "llama3.2"
  ollama_base_url: "http://localhost:11434"
  min_cooldown_seconds: 5.0
  max_tokens: 120

overlay:
  position: "top_right"  # top_right | right_center
  tip_duration_seconds: 8.0

state:
  history_seconds: 30.0

# API keys: prefer environment variables OPENAI_API_KEY, ANTHROPIC_API_KEY
